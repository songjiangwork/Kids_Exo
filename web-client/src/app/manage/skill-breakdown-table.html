<section class="table-shell">
  <div class="table-toolbar">
    <mat-form-field appearance="outline">
      <mat-label>Search skill</mat-label>
      <input matInput (input)="setSearch($any($event.target).value)" />
    </mat-form-field>
  </div>

  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container matColumnDef="skill">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Skill</th>
      <td mat-cell *matCellDef="let skill"><strong>{{ skill.title }}</strong></td>
    </ng-container>

    <ng-container matColumnDef="correct">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Correct</th>
      <td mat-cell *matCellDef="let skill">{{ skill.correct_answers }}</td>
    </ng-container>

    <ng-container matColumnDef="total">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Total</th>
      <td mat-cell *matCellDef="let skill">{{ skill.total_questions }}</td>
    </ng-container>

    <ng-container matColumnDef="accuracy">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Accuracy</th>
      <td mat-cell *matCellDef="let skill">{{ formatPercent(skill.accuracy) }}</td>
    </ng-container>

    <ng-container matColumnDef="focus">
      <th mat-header-cell *matHeaderCellDef>Status/Focus</th>
      <td mat-cell *matCellDef="let skill"><span class="status-pill">{{ focusLabel(skill) }}</span></td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  @if (dataSource.filteredData.length === 0) {
    <p class="empty-state">No skills match this search.</p>
  }
</section>
