@switch (rendererType()) {
  @case ('numeric_answer') {
    <app-numeric-answer-renderer
      [answer]="scalarAnswer()"
      (answerChange)="answerChange.emit($event)"
      [disabled]="disabled"
      [submitting]="submitting"
      (submitAnswer)="submitAnswer.emit()"
    />
  }

  @case ('multiple_choice') {
    <app-choice-answer-renderer
      [choices]="question.choices ?? []"
      [disabled]="disabled || submitting"
      (submitChoice)="submitChoice.emit($event)"
    />
  }

  @case ('listening_choice') {
    <app-choice-answer-renderer
      [choices]="question.choices ?? []"
      [disabled]="disabled || submitting"
      (submitChoice)="submitChoice.emit($event)"
    />
  }

  @case ('word_problem_answer') {
    <app-word-problem-answer-renderer
      [question]="question"
      [disabled]="disabled"
      [submitting]="submitting"
      (answerChange)="answerChange.emit($event)"
      (submitAnswer)="submitAnswer.emit()"
    />
  }

  @case ('spelling_answer') {
    <app-spelling-answer-renderer
      [question]="question"
      [disabled]="disabled"
      [submitting]="submitting"
      (answerChange)="answerChange.emit($event)"
      (submitAnswer)="submitAnswer.emit()"
    />
  }

  @default {
    <p class="error">This question type is not supported yet.</p>
  }
}
