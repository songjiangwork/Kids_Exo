<mat-toolbar class="topbar">
  <a class="brand" routerLink="/home">
    <span class="brand-mark">K</span>
    <span>Kids Exo</span>
  </a>
  <span class="spacer"></span>
  <a mat-button routerLink="/manage/worksheets">Print worksheets</a>
  <a mat-button routerLink="/manage/students">Students</a>
  <a mat-button routerLink="/manage">Parent Studio</a>
  @if (account(); as parent) {
    <span class="account-label">{{ parent.display_name }}</span>
    <button mat-button type="button" (click)="lockParent()" [disabled]="lockingParent()">
      {{ lockingParent() ? 'Locking...' : 'Lock parent' }}
    </button>
    <button mat-button type="button" (click)="logout()" [disabled]="loggingOut()">
      {{ loggingOut() ? 'Signing out...' : 'Logout' }}
    </button>
  } @else {
    <a mat-button routerLink="/login">Login</a>
  }
</mat-toolbar>
<main class="app-stage">
  <router-outlet />
</main>
