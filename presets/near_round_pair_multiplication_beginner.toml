version = 1

[worksheet]
title = "Near Round-Number Pair Multiplication Practice"
locale = "en-CA"
student_fields = ["name", "date", "time"]

[output]
renderer = "pdf"
theme = "classic_a4"

[output.options]
paper_size = "A4"
orientation = "portrait"

[[sections]]
name = "warmup"
plugin = "near_round_pair_multiplication"
count = 4
columns = 1
format = "guided_same_side_round"

[sections.settings]
round_numbers = [20, 30, 40, 50, 60, 70, 80, 90, 100]
near_round_distances = [1, 2, 3]
strategies = ["both_below_round", "both_above_round"]
allow_duplicates = false

[sections.settings.strategy_weights]
both_below_round = 0.5
both_above_round = 0.5

[[sections]]
name = "practice"
plugin = "near_round_pair_multiplication"
count = 30
columns = 2
format = "expression_with_answer_blank"

[sections.settings]
round_numbers = [20, 30, 40, 50, 60, 70, 80, 90, 100]
near_round_distances = [1, 2, 3]
strategies = ["both_below_round", "both_above_round"]
allow_duplicates = false

[sections.settings.strategy_weights]
both_below_round = 0.5
both_above_round = 0.5
